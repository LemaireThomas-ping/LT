<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Console Admin | Lemaire Thomas</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body style="background: #0b0c13; color: white; font-family: 'Inter', sans-serif; padding: 20px;">

<section id="admin-console" style="max-width: 600px; margin: auto;">
    <h2 style="font-family: 'Orbitron'; color: #00f0ff;"><i class="fas fa-terminal"></i> Console d'Upload</h2>
    
    <div style="background: rgba(26, 27, 38, 0.9); padding: 30px; border-radius: 8px; border: 1px solid #333;">
        <p>1. Fine-grained Token</p>
        <input type="password" id="gh-token" placeholder="Ton Token GitHub" style="width: 100%; padding: 10px; margin-bottom: 20px; background: #07080c; border: 1px solid #333; color: white;">
        
        <p>2. Fichier (PDF, Doc...)</p>
        <input type="file" id="file-input" style="margin-bottom: 20px;">
        
        <p>3. Description du projet</p>
        <input type="text" id="proj-desc" placeholder="Ex: Installation d'un serveur AD DS" style="width: 100%; padding: 10px; margin-bottom: 20px; background: #07080c; border: 1px solid #333; color: white;">

        <p>4. URL de l'image (Optionnel)</p>
        <input type="text" id="img-url" placeholder="Lien vers une image" style="width: 100%; padding: 10px; margin-bottom: 20px; background: #07080c; border: 1px solid #333; color: white;">
        
        <button onclick="uploadToGithub()" style="width: 100%; padding: 15px; background: #00f0ff; color: #0b0c13; border: none; font-weight: bold; cursor: pointer; font-family: 'Orbitron';">
            ENVOYER SUR LE REPO
        </button>
        
        <p id="status" style="margin-top: 20px; text-align: center; font-weight: bold;"></p>
    </div>
</section>

<script>
    async function uploadToGithub() {
        const token = document.getElementById('gh-token').value;
        const fileInput = document.getElementById('file-input');
        const desc = document.getElementById('proj-desc').value || "Documentation technique";
        const img = document.getElementById('img-url').value || "";
        const status = document.getElementById('status');
        const username = "LemaireThomas-ping";
        const repo = "LT";

        if (!token || !fileInput.files[0]) {
            status.innerText = "❌ Manque token ou fichier";
            return;
        }

        const file = fileInput.files[0];
        const reader = new FileReader();

        reader.onload = async function() {
            const content = reader.result.split(',')[1];
            const path = `docs/${file.name}`;

            try {
                status.innerText = "⏳ Envoi du fichier...";
                // 1. Upload le fichier
                await fetch(`https://api.github.com/repos/${username}/${repo}/contents/${path}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}` },
                    body: JSON.stringify({ message: `Add ${file.name}`, content: content })
                });

                status.innerText = "⏳ Mise à jour du registre...";
                // 2. Récupère data.json
                let projects = [];
                let sha = null;
                try {
                    const res = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/data.json`, {
                        headers: { 'Authorization': `token ${token}` }
                    });
                    const data = await res.json();
                    sha = data.sha;
                    projects = JSON.parse(atob(data.content));
                } catch (e) { console.log("Nouveau data.json"); }

                // 3. Ajoute le projet
                projects.push({
                    name: file.name,
                    title: file.name.split('.')[0].replace(/-/g, ' '),
                    description: desc,
                    image: img,
                    category: file.name.toLowerCase().includes('win') ? 'windows' : 
                              (file.name.toLowerCase().includes('linux') ? 'linux' : 'reseaux')
                });

                // 4. Envoie le JSON
                await fetch(`https://api.github.com/repos/${username}/${repo}/contents/data.json`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}` },
                    body: JSON.stringify({
                        message: "Update data.json",
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(projects, null, 2)))),
                        sha: sha
                    })
                });

                status.innerText = "✅ Succès !";
            } catch (err) { status.innerText = "❌ Erreur"; }
        };
        reader.readAsDataURL(file);
    }
</script>
</body>
</html>
