<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Console Admin | Lemaire Thomas</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<section id="admin-console">
    <h2><i class="fas fa-terminal"></i> Console d'Upload sécurisée</h2>
    
    <div class="card">
        <p><i class="fas fa-key"></i> 1. Authentification</p>
        <input type="password" id="gh-token" placeholder="Colle ton Fine-grained Token ici..." style="width: 100%; padding: 10px; margin-bottom: 20px;">
        
        <p><i class="fas fa-file-upload"></i> 2. Sélection du document (PDF ou Image)</p>
        <input type="file" id="file-input" style="margin-bottom: 20px;">
        
        <p><i class="fas fa-pen"></i> 3. Description rapide</p>
        <input type="text" id="commit-msg" placeholder="Ex: Tuto Installation AD DS" style="width: 100%; padding: 10px; margin-bottom: 20px;">
        
        <button onclick="uploadToGithub()" class="btn-download" style="width: 100%; padding: 15px; background: #00f0ff; color: #0b0c13; border: none; font-weight: bold; cursor: pointer;">
            <i class="fas fa-cloud-upload-alt"></i> ENVOYER SUR LE REPO
        </button>
        
        <p id="status" style="margin-top: 20px; font-weight: bold; text-align: center;"></p>
    </div>
</section>

<script>
    async function uploadToGithub() {
        const token = document.getElementById('gh-token').value;
        const fileInput = document.getElementById('file-input');
        const msg = document.getElementById('commit-msg').value || "Upload via Admin Console";
        const status = document.getElementById('status');

        if (!token || !fileInput.files[0]) {
            status.style.color = "#ff4444";
            status.innerText = "❌ Erreur : Token ou fichier manquant.";
            return;
        }

        const file = fileInput.files[0];
        const reader = new FileReader();

        reader.onload = async function() {
            const content = reader.result.split(',')[1];
            // On envoie dans le dossier docs/
            const path = `docs/${file.name}`; 
            
            // REMPLACE CES DEUX LIGNES PAR TES INFOS GITHUB
            const username = "TON_PSEUDO_GITHUB"; 
            const repo = "TON_NOM_DE_REPO";

            status.style.color = "#00f0ff";
            status.innerText = "⏳ Upload en cours vers GitHub...";

            try {
                const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/${path}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: msg,
                        content: content
                    })
                });

                if (response.ok) {
                    status.style.color = "#00ff00";
                    status.innerText = "✅ Succès ! Ton fichier est sur le repo. Le site se mettra à jour d'ici 1 à 2 minutes.";
                } else {
                    const errorData = await response.json();
                    status.style.color = "#ff4444";
                    status.innerText = "❌ Erreur API : " + errorData.message;
                }
            } catch (err) {
                status.style.color = "#ff4444";
                status.innerText = "❌ Erreur réseau.";
            }
        };
        reader.readAsDataURL(file);
    }
</script>

</body>
</html>
