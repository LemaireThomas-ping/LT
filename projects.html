<script>
    let allFiles = []; // Stockage global pour le filtrage

    async function fetchProjects() {
        const username = "LemaireThomas-ping";
        const repo = "LT";
        const container = document.getElementById('projects-container');
        try {
            // On récupère les données depuis le fichier data.json qui contient tes descriptions
            const response = await fetch(`https://raw.githubusercontent.com/${username}/${repo}/main/data.json?t=${Date.now()}`);
            
            if (!response.ok) throw new Error("Base de données introuvable");

            allFiles = await response.json();
            renderProjects(allFiles);

        } catch (e) { 
            container.innerHTML = "<p style='color:red; text-align:center; font-family:Orbitron;'>ERREUR_FLUX_API : Connexion échouée.</p>"; 
        }
    }

    function renderProjects(filesToDisplay) {
        const username = "LemaireThomas-ping";
        const repo = "LT";
        const container = document.getElementById('projects-container');
        container.innerHTML = "";

        if (filesToDisplay.length === 0) {
            container.innerHTML = "<p style='text-align:center; color:#555; width:100%;'>Aucun fichier ne correspond à ce filtre.</p>";
            return;
        }

        // On affiche les projets (les derniers envoyés apparaissent en premier)
        [...filesToDisplay].reverse().forEach(file => {
            const card = document.createElement('div');
            card.className = 'project-card';
            
            // On extrait l'extension du nom du fichier
            const extension = file.name.split('.').pop().toUpperCase();
            
            // Gestion de l'image : si elle existe dans le JSON, on l'affiche
            const imgTag = file.image ? `<img src="${file.image}" style="width:100%; height:160px; object-fit:cover; border-radius:4px; margin-bottom:15px; border:1px solid rgba(0, 240, 255, 0.1);">` : '';
            
            card.innerHTML = `
                ${imgTag}
                <div style="display:flex; justify-content:space-between; align-items:start; gap: 10px;">
                    <h3 style="margin:0; font-size: 0.9em; font-family: 'Orbitron';">${file.title.toUpperCase()}</h3>
                    <span class="extension-badge">${extension}</span>
                </div>
                <p style="font-size: 0.8em; color: #888; margin-top: 10px; font-family: 'Inter';">${file.description}</p>
                <a href="https://raw.githubusercontent.com/${username}/${repo}/main/docs/${file.name}" target="_blank" class="btn-open">LIRE LE FICHIER</a>`;
            
            container.appendChild(card);
        });
    }

    function filterProjects(category) {
        // Mise à jour visuelle des boutons (ton code original)
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.classList.remove('active');
            const btnText = btn.innerText.toLowerCase();
            if(btnText === category || (category === 'all' && btnText === 'tous') || (category === 'reseaux' && btnText === 'réseaux')) {
                btn.classList.add('active');
            }
        });

        // Filtrage basé sur la catégorie enregistrée dans le JSON
        if (category === 'all') {
            renderProjects(allFiles);
        } else {
            const filtered = allFiles.filter(file => {
                // On vérifie la catégorie ou on cherche des mots-clés dans le nom si besoin
                return file.category === category;
            });
            renderProjects(filtered);
        }
    }

    fetchProjects();
</script>
