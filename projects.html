<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projets | Lemaire Thomas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- COPIE STRICTE DES STYLES DE TA PAGE CONTACT --- */
        body { background: #0b0c13; color: white; margin: 0; font-family: 'Inter', sans-serif; }
        
        header h1 { font-family: 'Orbitron', sans-serif; font-size: 2.5em; margin: 0; letter-spacing: 4px; } /* Taille exacte du contact */
        header p { color: #00f0ff; font-family: 'Orbitron'; margin-top: 10px; }

        .main-nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 15px;
            background: #07080c;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #333;
        }
        .main-nav a {
            color: #888;
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85em;
            transition: 0.3s;
            white-space: nowrap;
        }
        .main-nav a:hover, .main-nav a.active {
            color: #00f0ff;
            text-shadow: 0 0 10px #00f0ff;
        }

        /* Correction Mobile */
        @media (max-width: 768px) {
            .main-nav { gap: 8px; padding: 12px 5px; justify-content: space-around; }
            .main-nav a { font-size: 0.65em; }
        }

        /* --- STYLE DES PROJETS (ADAPTÉ AU DESIGN CONTACT) --- */
        section { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        
        .project-header { 
            font-family: 'Orbitron'; 
            color: #00f0ff; 
            margin-bottom: 25px; 
            border-left: 3px solid #00f0ff; 
            padding-left: 15px; 
        }

        #projects-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .project-card {
            background: rgba(26, 27, 38, 0.9);
            border: 1px solid rgba(0, 240, 255, 0.1);
            padding: 15px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
        }

        /* CORRECTION DIMENSION IMAGE */
        .project-img {
            width: 100%;
            height: 120px; 
            object-fit: cover;
            border-radius: 4px;
            margin-bottom: 15px;
            border: 1px solid #333;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .card-title {
            margin: 0;
            font-family: 'Orbitron';
            font-size: 0.8em;
            color: #eee;
        }

        .badge {
            font-size: 0.6em;
            color: #00f0ff;
            border: 1px solid #00f0ff;
            padding: 2px 6px;
            font-family: 'Orbitron';
        }

        .desc-details {
            border: 1px solid #333;
            background: #0b0c13;
            margin-bottom: 15px;
            border-radius: 4px;
        }

        .desc-summary {
            padding: 8px 10px;
            cursor: pointer;
            font-family: 'Orbitron';
            font-size: 0.65em;
            color: #00f0ff;
            display: flex;
            justify-content: space-between;
        }

        .desc-content {
            padding: 10px;
            font-size: 0.8em;
            color: #888;
            border-top: 1px solid #333;
        }

        .btn-action {
            background: transparent;
            color: #00f0ff;
            border: 1px solid #00f0ff;
            padding: 12px;
            font-family: 'Orbitron';
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
            text-decoration: none;
            font-size: 0.75em;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .btn-action:hover {
            background: #00f0ff;
            color: #0b0c13;
            box-shadow: 0 0 20px #00f0ff;
        }

        footer p { text-align: center; padding: 40px; color: #444; font-size: 0.8em; }
    </style>
</head>
<body>

<header style="text-align: center; padding: 40px 20px;">
    <h1>LEMAIRE THOMAS</h1>
    <p>Technicien Systèmes & Réseaux</p>
</header>

<nav class="main-nav">
  <a href="index.html">À propos</a>
  <a href="projects.html" class="active">Projets</a>
  <a href="skills.html">Compétences</a>
  <a href="contact.html">Contact</a>
</nav>

<section>
    <h2 class="project-header">REPERTOIRE_PROJETS.EXE</h2>
    
    <div id="projects-container">
        </div>
</section>

<footer><p>© 2026 Lemaire Thomas | Portfolio IT</p></footer>

<script>
    async function loadProjects() {
        const container = document.getElementById('projects-container');
        try {
            const response = await fetch(`https://raw.githubusercontent.com/LemaireThomas-ping/LT/main/data.json?t=${Date.now()}`);
            const data = await response.json();
            
            container.innerHTML = data.reverse().map(file => `
                <div class="project-card">
                    ${file.image ? `<img src="${file.image}" class="project-img">` : ''}
                    <div class="card-header">
                        <h3 class="card-title">${file.title.toUpperCase()}</h3>
                        <span class="badge">${file.name.split('.').pop().toUpperCase()}</span>
                    </div>
                    <details class="desc-details">
                        <summary class="desc-summary">DETAILS_PROJET <i class="fas fa-chevron-down"></i></summary>
                        <div class="desc-content">${file.description}</div>
                    </details>
                    <a href="https://raw.githubusercontent.com/LemaireThomas-ping/LT/main/docs/${file.name}" target="_blank" class="btn-action">
                        OUVRIR LE DOCUMENT
                    </a>
                </div>
            `).join('');
        } catch (e) {
            container.innerHTML = "<p>Erreur lors du chargement des projets.</p>";
        }
    }
    loadProjects();
</script>
</body>
</html>
