<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">

<body>

<header>
    <h1>Mes Labs & Tutoriels</h1>
    <p style="color: #00f0ff; font-family: 'Orbitron';">Documentation technique dynamique</p>
</header>

<nav>
  <a href="index.html">À propos</a>
  <a href="projects.html" class="active">Projets</a>
  <a href="skills.html">Compétences</a>
  <a href="contact.html">Contact</a>
</nav>

<section>
    <h2><i class="fas fa-server"></i> Travaux récents</h2>
    <div id="projects-container">
        <p style="text-align:center;">Chargement des fichiers du lab...</p>
    </div>
</section>

<script>
    async function fetchProjects() {
        const username = "LemaireThomas-ping";
        const repo = "LT";
        const container = document.getElementById('projects-container');

        try {
            // On demande à GitHub la liste des fichiers dans /docs
            const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/docs`);
            const files = await response.json();

            container.innerHTML = ""; // On vide le message de chargement

            files.forEach(file => {
                // On ignore le fichier .txt de garde
                if (file.name !== "dossiertuto.txt") {
                    const card = document.createElement('div');
                    card.className = 'card';
                    
                    // On nettoie le nom pour l'affichage (ex: supprime .pdf)
                    const displayName = file.name.split('.')[0].replace(/-/g, ' ');
                    const extension = file.name.split('.').pop().toUpperCase();

                    card.innerHTML = `
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <h3 style="margin:0;">${displayName}</h3>
                            <span style="background:#00f0ff22; color:#00f0ff; padding:2px 8px; border-radius:4px; font-size:12px;">${extension}</span>
                        </div>
                        <p style="margin:15px 0;">Documentation technique disponible en ligne.</p>
                        <a href="https://raw.githubusercontent.com/${username}/${repo}/main/docs/${file.name}" target="_blank" class="btn-download" style="text-decoration:none; display:inline-block; text-align:center;">
                            <i class="fas fa-external-link-alt"></i> Ouvrir le document
                        </a>
                    `;
                    container.appendChild(card);
                }
            });
        } catch (error) {
            container.innerHTML = "<p>Erreur lors du chargement des fichiers.</p>";
        }
    }

    fetchProjects();
</script>

<footer>
    <p>© 2026 Lemaire Thomas | Portfolio IT</p>

</body>
