<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projets | Lemaire Thomas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #0b0c13; color: white; margin: 0; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* --- NAVIGATION --- */
        .main-nav {
            display: flex; justify-content: center; gap: 20px; padding: 15px;
            background: #07080c; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #333;
        }
        .main-nav a {
            color: #888; text-decoration: none; font-family: 'Orbitron', sans-serif;
            font-size: 0.85em; transition: 0.3s; white-space: nowrap;
        }
        .main-nav a:hover, .main-nav a.active { color: #00f0ff; text-shadow: 0 0 10px #00f0ff; }

        @media (max-width: 768px) {
            .main-nav { gap: 8px; padding: 12px 5px; justify-content: space-around; }
            .main-nav a { font-size: 0.65em; }
        }

        /* --- FILTRES --- */
        .filter-container {
            display: flex; justify-content: center; gap: 10px; margin: 40px 0; flex-wrap: wrap;
        }
        .filter-btn {
            background: transparent; border: 1px solid #333; color: #888; padding: 10px 20px;
            font-family: 'Orbitron', sans-serif; font-size: 0.75em; cursor: pointer;
            transition: 0.3s; border-radius: 4px; text-transform: uppercase;
        }
        .filter-btn:hover, .filter-btn.active {
            border-color: #00f0ff; color: #00f0ff; box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
            background: rgba(0, 240, 255, 0.05);
        }

        /* --- SECTION PROJETS --- */
        section { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }
        h2 { font-family: 'Orbitron', sans-serif; color: #00f0ff; border-left: 4px solid #00f0ff; padding-left: 20px; margin-bottom: 40px; font-size: 1.5em; letter-spacing: 2px; }

        #projects-container {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px;
        }

        .project-card {
            background: rgba(26, 27, 38, 0.8); border: 1px solid rgba(0, 240, 255, 0.1);
            padding: 25px; border-radius: 12px; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; flex-direction: column; justify-content: space-between;
            position: relative; overflow: hidden;
        }
        .project-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, #00f0ff, transparent); transform: translateX(-100%); transition: 0.5s;
        }
        .project-card:hover::before { transform: translateX(100%); }
        .project-card:hover {
            border-color: #00f0ff; transform: translateY(-8px); box-shadow: 0 10px 30px rgba(0, 240, 255, 0.15);
            background: rgba(26, 27, 38, 1);
        }

        .extension-badge {
            background: rgba(0, 240, 255, 0.1); color: #00f0ff; padding: 4px 10px; border-radius: 4px;
            font-size: 11px; font-family: 'Orbitron'; border: 1px solid rgba(0, 240, 255, 0.3); font-weight: bold;
        }

        .btn-open {
            margin-top: 25px; display: block; text-align: center; padding: 12px;
            background: transparent; color: #00f0ff; border: 1px solid #00f0ff;
            text-decoration: none; font-family: 'Orbitron'; font-size: 0.85em; transition: 0.3s;
            border-radius: 4px; letter-spacing: 1px; font-weight: 600;
        }
        .btn-open:hover { background: #00f0ff; color: #0b0c13; box-shadow: 0 0 20px rgba(0, 240, 255, 0.4); }

        footer { border-top: 1px solid #1a1b26; margin-top: 60px; }
    </style>
</head>
<body>

<header style="text-align: center; padding: 60px 20px; background: radial-gradient(circle at center, rgba(0,240,255,0.05) 0%, transparent 70%);">
    <h1 style="font-family: 'Orbitron'; font-size: 2.5em; margin: 0; letter-spacing: 4px;">LEMAIRE THOMAS</h1>
    <p style="color: #00f0ff; font-family: 'Orbitron'; margin-top: 15px; font-size: 0.9em; opacity: 0.8;">&gt; ACCÈS_LOG_PROJETS_SÉCURISÉ</p>
</header>

<nav class="main-nav">
  <a href="index.html">À propos</a>
  <a href="projects.html" class="active">Projets</a>
  <a href="skills.html">Compétences</a>
  <a href="contact.html">Contact</a>
</nav>

<section>
    <h2><i class="fas fa-terminal" style="margin-right: 15px;"></i>RÉPERTOIRE_DES_DOCS</h2>

    <div class="filter-container">
        <button class="filter-btn active" onclick="filterProjects('all')">Tous les Labs</button>
        <button class="filter-btn" onclick="filterProjects('windows')"><i class="fab fa-windows"></i> Windows</button>
        <button class="filter-btn" onclick="filterProjects('linux')"><i class="fab fa-linux"></i> Linux</button>
        <button class="filter-btn" onclick="filterProjects('reseaux')"><i class="fas fa-network-wired"></i> Réseaux</button>
    </div>

    <div id="projects-container">
        <div style="grid-column: 1/-1; text-align: center; padding: 50px;">
            <i class="fas fa-circle-notch fa-spin" style="font-size: 2em; color: #00f0ff; margin-bottom: 20px;"></i>
            <p style="font-family: 'Orbitron'; color: #888;">INITIALISATION_DU_FLUX_API...</p>
        </div>
    </div>
</section>

<footer><p style="text-align: center; padding: 40px; color: #444; font-size: 0.8em; font-family: 'Orbitron';">© 2026 Lemaire Thomas | Système d'administration GitHub v2.0</p></footer>

<script>
    let allFiles = []; 

    async function fetchProjects() {
        const username = "LemaireThomas-ping";
        const repo = "LT";
        const container = document.getElementById('projects-container');
        try {
            const response = await fetch(`https://raw.githubusercontent.com/${username}/${repo}/main/data.json?t=${Date.now()}`);
            if (!response.ok) {
                container.innerHTML = "<div style='grid-column: 1/-1; text-align:center; padding:40px;'><p style='color:#888; font-family:Orbitron;'>AUCUNE_DONNÉE_DÉTECTÉE. VEUILLEZ_UPLOADER_VIA_ADMIN.</p></div>";
                return;
            }
            allFiles = await response.json();
            renderProjects(allFiles);
        } catch (e) { 
            container.innerHTML = "<div style='grid-column: 1/-1; text-align:center; padding:40px;'><p style='color:#ff4444; font-family:Orbitron;'>ERREUR_FLUX_SYSTÈME : CONNEXION_REFUSÉE</p></div>"; 
        }
    }

    function renderProjects(filesToDisplay) {
        const container = document.getElementById('projects-container');
        container.innerHTML = "";
        const username = "LemaireThomas-ping";
        const repo = "LT";

        if (filesToDisplay.length === 0) {
            container.innerHTML = "<p style='text-align:center; color:#555; width:100%; grid-column: 1/-1;'>Aucun fichier trouvé pour cette catégorie.</p>";
            return;
        }

        [...filesToDisplay].reverse().forEach(file => {
            const card = document.createElement('div');
            card.className = 'project-card';
            
            const extension = file.name.split('.').pop().toUpperCase();
            const imgTag = file.image ? `<img src="${file.image}" style="width:100%; height:170px; object-fit:cover; border-radius:8px; margin-bottom:20px; border:1px solid rgba(0,240,255,0.1);">` : '';
            
            card.innerHTML = `
                ${imgTag}
                <div style="display:flex; justify-content:space-between; align-items:start; gap: 15px;">
                    <h3 style="margin:0; font-size: 0.95em; font-family: 'Orbitron'; color:#eee; line-height:1.4;">${file.title.toUpperCase()}</h3>
                    <span class="extension-badge">${extension}</span>
                </div>
                <p style="font-size: 0.85em; color: #aaa; margin-top: 15px; font-family: 'Inter'; line-height:1.6; flex-grow:1;">${file.description}</p>
                <a href="https://raw.githubusercontent.com/${username}/${repo}/main/docs/${file.name}" target="_blank" class="btn-open">OuvRIR_LE_LOG <i class="fas fa-external-link-alt" style="font-size:0.8em; margin-left:5px;"></i></a>`;
            container.appendChild(card);
        });
    }

    function filterProjects(category) {
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.classList.remove('active');
            const btnText = btn.innerText.toLowerCase();
            if(btnText.includes(category) || (category === 'all' && btnText.includes('tous'))) {
                btn.classList.add('active');
            }
        });

        const filtered = (category === 'all') ? allFiles : allFiles.filter(f => f.category === category);
        renderProjects(filtered);
    }

    fetchProjects();
</script>
</body>
</html>
