<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projets | Lemaire Thomas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    </head>
<body>
<header>
    <h1>Mes Labs & Tutoriels</h1>
    <p style="color: #00f0ff; font-family: 'Orbitron';">Documentation technique dynamique</p>
</header>
<nav>
  <a href="index.html">À propos</a>
  <a href="projects.html" class="active">Projets</a>
  <a href="skills.html">Compétences</a>
  <a href="contact.html">Contact</a>
</nav>
<section>
    <h2><i class="fas fa-server"></i> Travaux récents</h2>
    <div id="projects-container"><p style="text-align:center;">Chargement des fichiers du lab...</p></div>
</section>
<script>
    async function fetchProjects() {
        const username = "LemaireThomas-ping";
        const repo = "LT";
        const container = document.getElementById('projects-container');
        try {
            const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/docs`);
            const files = await response.json();
            container.innerHTML = "";
            files.forEach(file => {
                if (file.name !== "dossiertuto.txt") {
                    const card = document.createElement('div');
                    card.className = 'card';
                    const displayName = file.name.split('.')[0].replace(/-/g, ' ');
                    const extension = file.name.split('.').pop().toUpperCase();
                    card.innerHTML = `
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <h3 style="margin:0;">${displayName}</h3>
                            <span style="background:#00f0ff22; color:#00f0ff; padding:2px 8px; border-radius:4px; font-size:12px;">${extension}</span>
                        </div>
                        <a href="https://raw.githubusercontent.com/${username}/${repo}/main/docs/${file.name}" target="_blank" class="btn-download" style="margin-top:15px; text-decoration:none; display:block; text-align:center;">Ouvrir</a>`;
                    container.appendChild(card);
                }
            });
        } catch (e) { container.innerHTML = "<p>Erreur API.</p>"; }
    }
    fetchProjects();
    // Script du loader (identique à index.html)
</script>
</body>
</html>
