<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projets | Lemaire Thomas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- TON CSS DE RÉFÉRENCE --- */
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #0b0c13, #1b1d26);
            color: #e0e5eb;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 100px 20px;
            background: linear-gradient(135deg, #0b0c13, #1b1d26);
            border-bottom: 2px solid #00f0ff33;
            box-shadow: 0 4px 20px rgba(0,255,255,0.1);
        }

        header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.2em;
            color: #00f0ff;
            text-shadow: 0 0 15px #00f0ff66, 0 0 25px #00fff099;
            animation: pulse 3s infinite;
            margin: 0;
        }

        header p {
            color: #00f0ff;
            font-family: 'Orbitron';
            margin-top: 15px;
        }

        @keyframes pulse {
            0%, 100% { text-shadow: 0 0 15px #00f0ff66, 0 0 25px #00fff099; }
            50% { text-shadow: 0 0 25px #00f0ff99, 0 0 40px #00fff0aa; }
        }

        nav {
            text-align: center;
            padding: 20px;
            background-color: #1b1d26;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav a {
            color: #00f0ff;
            margin: 0 18px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
            text-transform: lowercase; /* Appliqué selon ta demande */
        }

        nav a:hover, nav a.active {
            color: #00fff0;
            text-shadow: 0 0 10px #00fff099;
        }

        section {
            padding: 60px 20px;
            max-width: 900px;
            margin: auto;
        }

        h2 {
            font-family: 'Orbitron';
            color: #00f0ff;
            margin-bottom: 40px;
            text-shadow: 0 0 8px #00f0ff44;
            border-left: 3px solid #00f0ff;
            padding-left: 15px;
        }

        /* --- STRUCTURE DES CARTES (Adaptée à ta DA) --- */
        .project-card {
            background-color: #1b1d26;
            padding: 25px;
            margin-bottom: 35px;
            border-radius: 14px;
            border: 1px solid #00f0ff33;
            box-shadow: 0 6px 15px rgba(0,255,255,0.15);
        }

        .project-img {
            width: 100%;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #00f0ff22;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .card-title {
            font-family: 'Orbitron';
            font-size: 1.1em;
            color: #eee;
            margin: 0;
        }

        .badge {
            font-family: 'Orbitron';
            font-size: 0.7em;
            color: #00f0ff;
            border: 1px solid #00f0ff;
            padding: 4px 10px;
            border-radius: 4px;
        }

        /* DÉTAILS / ACCORDÉON */
        details {
            background: #0b0c13;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #00f0ff11;
        }

        summary {
            padding: 15px;
            cursor: pointer;
            font-family: 'Orbitron';
            font-size: 0.8em;
            color: #00f0ff;
            list-style: none;
            display: flex;
            justify-content: space-between;
        }

        .desc-content {
            padding: 0 15px 15px;
            font-size: 0.9em;
            color: #999;
            line-height: 1.6;
        }

        /* BOUTON ACTION (Ton style de bouton form) */
        .btn-action {
            display: block;
            width: 100%;
            background-color: #00f0ff;
            color: #0b0c13;
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            font-family: 'Inter';
            transition: 0.3s;
            box-sizing: border-box;
        }

        .btn-action:hover {
            background-color: #00fff0;
            box-shadow: 0 0 15px rgba(0,255,240,0.5);
            transform: scale(1.01);
        }

        footer {
            text-align: center;
            padding: 40px;
            background-color: #1b1d26;
            color: #999;
            border-top: 1px solid #00f0ff22;
            font-family: 'Orbitron';
            font-size: 0.8em;
        }
    </style>
</head>
<body>

<header>
    <h1>LEMAIRE THOMAS</h1>
    <p>Technicien Systèmes & Réseaux</p>
</header>

<nav>
    <a href="index.html">à propos</a>
    <a href="projects.html" class="active">projets</a>
    <a href="skills.html">compétences</a>
    <a href="contact.html">contact</a>
</nav>

<section>
    <h2>|_> REPERTOIRE_PROJETS.EXE</h2>
    <div id="projects-container">
        </div>
</section>

<footer>© 2026 Lemaire Thomas | Portfolio IT</footer>

<script>
    async function fetchProjects() {
        const container = document.getElementById('projects-container');
        try {
            const resp = await fetch(`https://raw.githubusercontent.com/LemaireThomas-ping/LT/main/data.json?t=${Date.now()}`);
            const data = await resp.json();
            container.innerHTML = data.reverse().map(p => `
                <div class="project-card">
                    ${p.image ? `<img src="${p.image}" class="project-img">` : ''}
                    <div class="card-header">
                        <h3 class="card-title">${p.title.toUpperCase()}</h3>
                        <span class="badge">${p.name.split('.').pop().toUpperCase()}</span>
                    </div>
                    <details>
                        <summary>DETAILS_PROJET <i class="fas fa-chevron-down"></i></summary>
                        <div class="desc-content">${p.description}</div>
                    </details>
                    <a href="https://raw.githubusercontent.com/LemaireThomas-ping/LT/main/docs/${p.name}" target="_blank" class="btn-action">
                        OUVRIR LE DOCUMENT
                    </a>
                </div>
            `).join('');
        } catch (e) {
            container.innerHTML = "<p>Erreur de liaison avec la base de données...</p>";
        }
    }
    fetchProjects();
</script>
</body>
</html>
