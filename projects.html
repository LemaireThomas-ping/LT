<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projets | Lemaire Thomas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            background: #0b0c13; 
            color: white; 
            margin: 0; 
            font-family: 'Inter', sans-serif; 
        }

        /* --- TON HEADER CONSERVÉ --- */
        header { text-align: center; padding: 40px 20px; }
        header h1 { font-family: 'Orbitron', sans-serif; font-size: 2.5em; margin: 0; letter-spacing: 4px; }
        header p { color: #00f0ff; font-family: 'Orbitron'; margin-top: 10px; }

        /* --- TA NAVIGATION (avec minuscules) --- */
        .main-nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 15px;
            background: #07080c;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #333;
        }

        .main-nav a {
            color: #888;
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85em;
            transition: 0.3s;
            white-space: nowrap;
            text-transform: lowercase; /* Appliqué ici */
        }

        .main-nav a:hover, .main-nav a.active {
            color: #00f0ff;
            text-shadow: 0 0 10px #00f0ff;
        }

        @media (max-width: 768px) {
            .main-nav { gap: 8px; padding: 12px 5px; justify-content: space-around; }
            .main-nav a { font-size: 0.65em; }
        }

        /* --- SECTION PROJETS INJECTÉE --- */
        section { 
            max-width: 1000px; 
            margin: 40px auto; 
            padding: 0 20px; 
        }

        .section-title { 
            font-family: 'Orbitron'; 
            color: #00f0ff; 
            margin-bottom: 30px; 
            border-left: 3px solid #00f0ff; 
            padding-left: 15px; 
            text-transform: uppercase;
        }

        #projects-container { 
            display: flex; 
            flex-direction: column; 
            gap: 35px; 
        }

        .project-card {
            background: rgba(26, 27, 38, 0.9);
            border: 1px solid rgba(0, 240, 255, 0.1);
            padding: 25px;
            border-radius: 8px;
            transition: 0.3s;
        }

        .project-img {
            width: 100%;
            height: auto;
            max-height: 450px;
            object-fit: contain;
            border-radius: 4px;
            margin-bottom: 20px;
            background: #000;
            border: 1px solid #1a1b26;
        }

        .card-info { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 20px; 
        }

        .card-title { 
            margin: 0; 
            font-family: 'Orbitron'; 
            font-size: 1em; 
            color: #eee; 
            letter-spacing: 1px;
        }

        .badge { 
            font-size: 0.7em; 
            color: #00f0ff; 
            border: 1px solid #00f0ff; 
            padding: 3px 10px; 
            font-family: 'Orbitron'; 
        }

        /* ACCORDÉON */
        .desc-details { 
            border: 1px solid #1a1b26; 
            background: #07080c; 
            margin-bottom: 20px; 
            border-radius: 4px; 
        }

        .desc-summary { 
            padding: 12px 15px; 
            cursor: pointer; 
            font-family: 'Orbitron'; 
            font-size: 0.75em; 
            color: #00f0ff; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }

        .desc-content { 
            padding: 15px; 
            font-size: 0.9em; 
            color: #aaa; 
            border-top: 1px solid #1a1b26; 
            line-height: 1.6;
        }

        /* BOUTON OUVRIR LE DOCUMENT */
        .btn-action {
            display: block;
            width: 100%;
            text-align: center;
            padding: 15px;
            background: transparent;
            color: #00f0ff;
            border: 1px solid #00f0ff;
            text-decoration: none;
            font-family: 'Orbitron';
            font-size: 0.85em;
            border-radius: 4px;
            transition: 0.3s;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .btn-action:hover {
            background: rgba(0, 240, 255, 0.1);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }

        footer { text-align: center; padding: 40px; color: #444; font-size: 0.8em; }
    </style>
</head>
<body>

<header>
    <h1>LEMAIRE THOMAS</h1>
    <p>Technicien Systèmes & Réseaux</p>
</header>

<nav class="main-nav">
  <a href="index.html">à propos</a>
  <a href="projects.html" class="active">projets</a>
  <a href="skills.html">compétences</a>
  <a href="contact.html">contact</a>
</nav>

<section>
    <h2 class="section-title">|_> REPERTOIRE_DES_LABS</h2>
    
    <div id="projects-container">
        </div>
</section>

<footer>© 2026 Lemaire Thomas | Portfolio IT</footer>

<script>
    async function loadProjects() {
        const container = document.getElementById('projects-container');
        try {
            const response = await fetch(`https://raw.githubusercontent.com/LemaireThomas-ping/LT/main/data.json?t=${Date.now()}`);
            const data = await response.json();
            
            container.innerHTML = data.reverse().map(file => `
                <div class="project-card">
                    ${file.image ? `<img src="${file.image}" class="project-img" alt="${file.title}">` : ''}
                    <div class="card-info">
                        <h3 class="card-title">${file.title.toUpperCase()}</h3>
                        <span class="badge">${file.name.split('.').pop().toUpperCase()}</span>
                    </div>
                    <details class="desc-details">
                        <summary class="desc-summary">DETAILS_DU_PROJET <i class="fas fa-chevron-down"></i></summary>
                        <div class="desc-content">${file.description}</div>
                    </details>
                    <a href="https://raw.githubusercontent.com/LemaireThomas-ping/LT/main/docs/${file.name}" target="_blank" class="btn-action">
                        OUVRIR LE DOCUMENT
                    </a>
                </div>
            `).join('');
        } catch (e) {
            container.innerHTML = "<p style='text-align:center;'>Erreur lors du chargement des projets...</p>";
        }
    }
    loadProjects();
</script>
</body>
</html>
