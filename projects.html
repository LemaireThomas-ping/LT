<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projets | Lemaire Thomas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #0b0c13, #1b1d26);
            color: #e0e5eb;
        }

        /* HEADER AJUSTÉ (Comme skills.html, épuré) */
        header {
            text-align: center;
            padding: 40px 20px; /* Espace réduit */
            background: linear-gradient(135deg, #0b0c13, #1b1d26);
            border-bottom: 2px solid #00f0ff33;
            box-shadow: 0 4px 20px rgba(0,255,255,0.1);
        }

        header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.2em;
            color: #00f0ff;
            text-shadow: 0 0 15px #00f0ff66, 0 0 25px #00fff099;
            animation: pulse 3s infinite;
            margin: 0;
        }

        .subtitle {
            color: #00f0ff;
            font-family: 'Orbitron', sans-serif;
            margin-top: 10px;
            font-size: 1.1em;
            text-shadow: 0 0 8px #00f0ff55;
        }

        @keyframes pulse {
            0%, 100% { text-shadow: 0 0 15px #00f0ff66, 0 0 25px #00fff099; }
            50% { text-shadow: 0 0 25px #00f0ff99, 0 0 40px #00fff0aa; }
        }

        /* NAVIGATION */
        .main-nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 15px;
            background: #07080c;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #333;
        }

        .main-nav a {
            color: #888;
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85em;
            transition: 0.3s;
            white-space: nowrap;
            text-transform: lowercase;
        }

        .main-nav a:hover, .main-nav a.active {
            color: #00f0ff;
            text-shadow: 0 0 10px #00f0ff;
        }

        /* SECTION PROJETS */
        #projects-section { 
            padding: 40px 20px;
            max-width: 1000px;
            margin: auto;
        }

        h2.main-title { 
            font-family: 'Orbitron';
            border-bottom: 2px solid #00f0ff;
            padding-bottom: 10px;
            margin-bottom: 30px;
            font-size: 1.4em;
            color: #00f0ff;
        }

        .projects-grid {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .project-card {
            background: rgba(26, 27, 38, 0.9);
            border: 1px solid rgba(0, 240, 255, 0.1);
            padding: 25px;
            border-radius: 8px;
            transition: 0.3s;
        }

        .project-card:hover {
            border-color: #00f0ff;
            transform: translateY(-3px);
        }

        /* --- CORRECTION ICI --- */
        .project-img {
            width: 100%;
            height: auto;
            max-height: 450px;
            object-fit: contain; /* S'assure que l'image tient dans le cadre */
            border-radius: 4px;
            margin-bottom: 20px;
            background: #000; /* Fond noir si l'image ne remplit pas tout */
            border: 1px solid #1a1b26;
            display: block; /* S'assure de l'affichage */
        }
        /* --- FIN CORRECTION --- */

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-family: 'Orbitron';
            color: #eee;
        }

        .card-title { font-size: 1em; margin: 0; }
        
        .badge {
            font-size: 0.7em;
            color: #00f0ff;
            border: 1px solid #00f0ff;
            padding: 3px 10px;
            border-radius: 4px;
        }

        /* ACCORDÉON DESCRIPTION */
        details {
            border: 1px solid #1a1b26;
            background: #07080c;
            margin-bottom: 20px;
            border-radius: 4px;
        }

        summary {
            padding: 12px;
            cursor: pointer;
            font-family: 'Orbitron';
            font-size: 0.75em;
            color: #00f0ff;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .desc-content {
            padding: 15px;
            font-size: 0.9em;
            color: #aaa;
            border-top: 1px solid #1a1b26;
            line-height: 1.6;
        }

        /* BOUTON ACTION */
        .btn-action {
            display: block;
            width: 100%;
            text-align: center;
            padding: 15px;
            background: transparent;
            color: #00f0ff;
            border: 1px solid #00f0ff;
            text-decoration: none;
            font-family: 'Orbitron';
            font-size: 0.85em;
            border-radius: 4px;
            transition: 0.3s;
        }

        .btn-action:hover {
            background: rgba(0, 240, 255, 0.1);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }

        footer {
            text-align: center;
            padding: 60px;
            color: #444;
            font-size: 0.8em;
        }

        @media (max-width:768px) {
            .main-nav { gap:8px; padding:12px 5px; justify-content:space-around; }
            .main-nav a { font-size:0.65em; }
        }
    </style>
</head>
<body>

<header>
    <h1>LEMAIRE THOMAS</h1>
    <p class="subtitle">Technicien Systèmes & Réseaux</p>
</header>

<nav class="main-nav">
    <a href="index.html">à propos</a>
    <a href="projects.html" class="active">projets</a>
    <a href="skills.html">compétences</a>
    <a href="contact.html">contact</a>
</nav>

<div id="projects-section">
    <h2 class="main-title"><i class="fas fa-terminal"></i> REPERTOIRE_PROJETS.EXE</h2>
    <div id="projects-container" class="projects-grid">
        </div>
</div>

<footer>© 2026 Lemaire Thomas | Portfolio IT</footer>

<script>
    async function loadProjects() {
        const container = document.getElementById('projects-container');
        try {
            // Utilisation d'un timestamp pour éviter le cache
            const response = await fetch(`https://raw.githubusercontent.com/LemaireThomas-ping/LT/main/data.json?t=${Date.now()}`);
            const data = await response.json();
            
            // Inverser l'ordre pour avoir les plus récents en premier
            container.innerHTML = data.reverse().map(file => `
                <div class="project-card">
                    ${file.image ? `<img src="${file.image}" class="project-img" alt="Illustration du projet ${file.title}">` : ''}
                    <div class="card-header">
                        <h3 class="card-title">${file.title.toUpperCase()}</h3>
                        <span class="badge">${file.name.split('.').pop().toUpperCase()}</span>
                    </div>
                    <details>
                        <summary>DETAILS_PROJET <i class="fas fa-chevron-down"></i></summary>
                        <div class="desc-content">${file.description}</div>
                    </details>
                    <a href="https://raw.githubusercontent.com/LemaireThomas-ping/LT/main/docs/${file.name}" target="_blank" class="btn-action">
                        OUVRIR LE DOCUMENT
                    </a>
                </div>
            `).join('');
        } catch (e) {
            container.innerHTML = "<p style='text-align:center; color:#ff9d00;'>Erreur lors du chargement des projets. Veuillez réessayer plus tard.</p>";
        }
    }
    loadProjects();
</script>
</body>
</html>
