<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projets | Lemaire Thomas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            margin: 0; font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #0b0c13, #1b1d26); color: #e0e5eb;
        }

        header {
            text-align: center; padding: 40px 20px;
            background: linear-gradient(135deg, #0b0c13, #1b1d26);
            border-bottom: 2px solid #00f0ff33; box-shadow: 0 4px 20px rgba(0,255,255,0.1);
        }

        header h1 {
            font-family: 'Orbitron', sans-serif; font-size: 3.2em;
            color: #00f0ff; 
            text-shadow: 0 0 4px rgba(0, 240, 255, 0.6);
            margin: 0;
        }

        .subtitle {
            color: #00f0ff;
            font-family: 'Orbitron', sans-serif;
            margin-top: 10px;
            font-size: 1.1em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .main-nav {
            display: flex; justify-content: center; gap: 20px; padding: 15px;
            background: #07080c; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #333;
        }

        .main-nav a {
            color: #888; text-decoration: none; font-family: 'Orbitron'; font-size: 0.85em;
            transition: 0.3s; text-transform: lowercase;
        }

        .main-nav a:hover, .main-nav a.active { color: #00f0ff; text-shadow: 0 0 10px #00f0ff; }

        .filter-container {
            display: flex; justify-content: center; gap: 10px; margin: 30px 0; flex-wrap: wrap;
        }

        .filter-btn {
            background: transparent; border: 1px solid #333; color: #888;
            padding: 8px 18px; cursor: pointer; font-family: 'Orbitron';
            font-size: 0.75em; border-radius: 4px; transition: 0.3s;
        }

        .filter-btn:hover, .filter-btn.active {
            border-color: #00f0ff; color: #00f0ff; box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
        }

        #projects-section { padding: 40px 20px; max-width: 1000px; margin: auto; }

        h2.main-title { 
            font-family: 'Orbitron'; border-bottom: 2px solid #00f0ff;
            padding-bottom: 10px; margin-bottom: 30px; font-size: 1.4em; color: #00f0ff;
        }

        .projects-grid { display: flex; flex-direction: column; gap: 30px; }

        .project-card {
            background: rgba(26, 27, 38, 0.9); border: 1px solid rgba(0, 240, 255, 0.1);
            padding: 25px; border-radius: 8px; transition: 0.3s;
        }

        .img-wrapper {
            width: 100%;
            height: 450px;
            background-color: #e6e0d1;
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid #1a1b26;
        }

        .project-img {
            max-width: 90%;
            max-height: 90%;
            width: auto;
            height: auto;
            object-fit: contain;
            display: block;
        }

        .card-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px; font-family: 'Orbitron'; color: #eee;
        }

        .badge {
            font-size: 0.7em; color: #00f0ff; border: 1px solid #00f0ff;
            padding: 3px 10px; border-radius: 4px; text-transform: uppercase;
        }

        details { border: 1px solid #1a1b26; background: #07080c; margin-bottom: 20px; border-radius: 4px; }
        summary { padding: 12px; cursor: pointer; font-family: 'Orbitron'; font-size: 0.75em; color: #00f0ff; }
        .desc-content { padding: 15px; font-size: 0.9em; color: #aaa; border-top: 1px solid #1a1b26; line-height: 1.6; }

        .btn-action {
            display: block; width: 100%; text-align: center; padding: 15px;
            background: transparent; color: #00f0ff; border: 1px solid #00f0ff;
            text-decoration: none; font-family: 'Orbitron'; font-size: 0.85em; border-radius: 4px;
        }

        footer { text-align: center; padding: 60px; color: #444; font-size: 0.8em; }
    </style>
</head>
<body>

<header>
    <h1>LEMAIRE THOMAS</h1>
    <p class="subtitle">Technicien Systèmes & Réseaux</p>
</header>

<nav class="main-nav">
    <a href="index.html">à propos</a>
    <a href="projects.html" class="active">projets</a>
    <a href="skills.html">compétences</a>
    <a href="contact.html">contact</a>
</nav>

<div id="projects-section">
    <h2 class="main-title"><i class="fas fa-terminal"></i> REPERTOIRE_PROJETS.EXE</h2>
    
    <div class="filter-container">
        <button class="filter-btn active" onclick="filterProjects('all', this)">TOUS</button>
        <button class="filter-btn" onclick="filterProjects('reseaux', this)">RÉSEAUX</button>
        <button class="filter-btn" onclick="filterProjects('windows', this)">WINDOWS</button>
        <button class="filter-btn" onclick="filterProjects('linux', this)">LINUX</button>
    </div>

    <div id="projects-container" class="projects-grid">
        <p style='text-align:center; color:#555;'>Initialisation du système...</p>
    </div>
</div>

<footer>© 2026 Lemaire Thomas | Portfolio IT</footer>

<script>
    let allProjects = [];
    const username = "LemaireThomas-ping";
    const repo = "LT";

    async function loadProjects() {
        const container = document.getElementById('projects-container');

        try {
            // Fetch avec anti-cache pour le développement
            const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/data.json?t=${Date.now()}`);
            
            if (!response.ok) {
                throw new Error(`Réponse réseau non OK (Statut: ${response.status})`);
            }

            const jsonData = await response.json();
            
            // Décodage UTF-8 robuste pour les accents français
            const binaryString = atob(jsonData.content);
            const bytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }
            const decodedContent = new TextDecoder('utf-8').decode(bytes);
            
            allProjects = JSON.parse(decodedContent).reverse();
            renderProjects(allProjects);

        } catch (e) {
            console.error("ERREUR_CHARGEMENT:", e);
            container.innerHTML = `
                <div style='text-align:center; padding: 20px; border: 1px solid #ff4b4b; border-radius: 8px;'>
                    <p style='color: #ff4b4b; font-family: "Orbitron";'>[!] ERREUR_SYSTEME : Échec de la récupération des données</p>
                    <small style='color: #555;'>Détails : ${e.message}</small>
                </div>`;
        }
    }

    function renderProjects(data) {
        const container = document.getElementById('projects-container');

        if (!data || data.length === 0) {
            container.innerHTML = "<p style='text-align:center; color:#555;'>Aucun projet trouvé dans cette catégorie.</p>";
            return;
        }

        container.innerHTML = data.map(file => `
            <div class="project-card">
                ${file.image ? `
                    <div class="img-wrapper">
                        <img src="${file.image}" class="project-img" alt="Illustration" onerror="this.parentElement.style.display='none'">
                    </div>
                ` : ''}
                <div class="card-header">
                    <h3 class="card-title">${(file.title || 'Sans titre').toUpperCase()}</h3>
                    <span class="badge">${file.category || 'LAB'}</span>
                </div>
                <details>
                    <summary>DETAILS_PROJET <i class="fas fa-chevron-down"></i></summary>
                    <div class="desc-content">${file.description || 'Description indisponible.'}</div>
                </details>
                <a href="https://raw.githubusercontent.com/${username}/${repo}/main/docs/${file.name}" target="_blank" class="btn-action">
                    OUVRIR LE DOCUMENT
                </a>
            </div>
        `).join('');
    }

    function filterProjects(category, btn) {
        // Gestion visuelle des boutons
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        if (category === 'all') {
            renderProjects(allProjects);
        } else {
            // Filtrage insensible à la casse
            const filtered = allProjects.filter(p => 
                p.category && p.category.toLowerCase() === category.toLowerCase()
            );
            renderProjects(filtered);
        }
    }

    // Exécution au chargement de la page
    loadProjects();
</script>
</body>
</html>
