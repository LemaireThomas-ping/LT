    <link rel="stylesheet" href="style.css">
    <style>
        .skills-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .skill-item { margin-bottom: 15px; }
        .skill-name { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 0.9em; }
        .progress-bar { background: #1a1b26; height: 8px; border-radius: 10px; border: 1px solid #00f0ff33; overflow: hidden; }
        .progress-fill { background: linear-gradient(90deg, #00f0ff, #7000ff); height: 100%; box-shadow: 0 0 10px #00f0ff; }
    </style>
</head>

<header><h1>Expertise Technique</h1></header>
<nav>
  <a href="index.html">À propos</a>

  <a href="contact.html">Contact</a>
</nav>
<section>
    <div class="skills-grid">
        <div class="card">
            <h3><i class="fas fa-desktop"></i> Systèmes</h3>
            <div class="skill-item"><div class="skill-name"><span>Windows Server</span><span>85%</span></div><div class="progress-bar"><div class="progress-fill" style="width: 85%;"></div></div></div>
            <div class="skill-item"><div class="skill-name"><span>Linux</span><span>70%</span></div><div class="progress-bar"><div class="progress-fill" style="width: 70%;"></div></div></div>
        </div>
        <div class="card">
            <h3><i class="fas fa-layer-group"></i> Virtualisation</h3>
            <div class="skill-item"><div class="skill-name"><span>VMware / Hyper-V</span><span>80%</span></div><div class="progress-bar"><div class="progress-fill" style="width: 80%;"></div></div></div>
        </div>
    </div>
