<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compétences | Lemaire Thomas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* On s'assure que le fond reste sombre même si le CSS externe ne charge pas */
        body { background: #0b0c13; color: white; margin: 0; font-family: 'Inter', sans-serif; }
        
        .skills-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 25px; 
            margin-top: 30px;
        }

        .skill-card {
            background: rgba(26, 27, 38, 0.9);
            border: 1px solid rgba(0, 240, 255, 0.2);
            padding: 25px;
            border-radius: 12px;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .skill-card:hover {
            border-color: #00f0ff;
            transform: translateY(-5px);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.15);
        }

        .skill-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            color: #00f0ff;
            font-family: 'Orbitron', sans-serif;
        }

        .skill-header i { font-size: 1.5em; }

        .tech-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tag {
            background: rgba(0, 240, 255, 0.1);
            color: #00f0ff;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 0.85em;
            border: 1px solid rgba(0, 240, 255, 0.3);
            font-weight: 600;
        }

        .level-container { margin-top: 15px; }

        .level-bar {
            height: 8px;
            background: #111;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid #222;
        }

        .level-fill {
            height: 100%;
            background: linear-gradient(90deg, #00f0ff, #7000ff);
            box-shadow: 0 0 10px #00f0ff;
        }

        .level-label {
            display: block;
            margin-top: 8px;
            font-size: 0.9em;
            color: #888;
            font-style: italic;
        }

        h2 { font-family: 'Orbitron'; color: #fff; border-bottom: 2px solid #00f0ff; display: inline-block; padding-bottom: 5px; }
    </style>
</head>
<body>
