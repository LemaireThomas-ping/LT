<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compétences | Lemaire Thomas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body { 
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #0b0c13, #1b1d26);
            color: #e0e5eb;
        }

        /* --- LOADER (SYNC AVEC INDEX) --- */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0b0c13; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
            transition: transform 1s cubic-bezier(0.7, 0, 0.3, 1), opacity 0.8s ease;
        }
        #loader.zoom-out { transform: scale(12); opacity: 0; pointer-events: none; }
        .network-anim { display: flex; align-items: center; gap: 20px; margin-bottom: 25px; }
        .node { color: #00f0ff; font-size: 45px; filter: drop-shadow(0 0 10px #00f0ff); }
        .packet {
            width: 14px; height: 14px; background: #00f0ff; border-radius: 50%;
            box-shadow: 0 0 15px #00f0ff; animation: transfer 0.8s infinite linear;
        }
        @keyframes transfer {
            0% { transform: translateX(-60px); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateX(60px); opacity: 0; }
        }
        .loader-text { color: #00f0ff; font-family: 'Orbitron'; font-weight: bold; letter-spacing: 4px; }

        /* --- HEADER & NAV (CORRECTIF ÉCART) --- */
        header {
            text-align: center;
            padding: 40px 20px; 
            background: linear-gradient(135deg, #0b0c13, #1b1d26);
            border-bottom: 2px solid #00f0ff33;
        }

        header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.2em;
            color: #00f0ff;
            margin: 0; 
        }

        .main-nav {
            display: flex;
            justify-content: center;
            padding: 15px;
            background: #07080c;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #333;
        }

        .main-nav a {
            color: #888;
            margin: 0 18px; /* ÉCART FIXÉ À 18PX COMME TON CSS GLOBAL */
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85em;
            transition: 0.3s;
            white-space: nowrap;
        }

        .main-nav a:hover, .main-nav a.active {
            color: #00f0ff;
            text-shadow: 0 0 10px #00f0ff;
        }

        /* --- TYPEWRITER STYLE --- */
        #dynamic-header { min-height: 1.5em; font-family: 'Orbitron'; color: #00f0ff; margin-bottom: 20px; }
        #typewriter-text::after {
            content: "_";
            animation: blink 0.8s infinite;
            margin-left: 5px;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* --- TES CARTES DE COMPÉTENCES --- */
        #skills-section { padding:40px 20px; max-width:1000px; margin:auto; }
        .skills-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:25px; margin-top:30px; }
        .skill-card { background:rgba(26,27,38,0.9); border:1px solid rgba(0,240,255,0.1); padding:25px; border-radius:8px; transition:0.3s; }
        .skill-card:hover { border-color:#00f0ff; transform:translateY(-3px); }
        .card-header { display:flex; align-items:center; gap:12px; margin-bottom:20px; color:#00f0ff; font-family:'Orbitron'; }
        .tag-list { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:15px; }
        .tag { background:#1a1b26; border:1px solid #333; padding:4px 10px; border-radius:4px; font-size:0.8em; color:#ccc; }
        .tag.blue { border-color:#00f0ff; color:#00f0ff; }
        .tag.orange { border-color:#ff9d00; color:#ff9d00; }
        .led { width:8px; height:8px; border-radius:50%; background:#27c93f; box-shadow:0 0 8px #27c93f; }
        .status-footer { display:flex; align-items:center; gap:10px; border-top:1px solid #1a1b26; padding-top:15px; }

        @media (max-width: 600px) {
            .skills-grid { grid-template-columns: 1fr; }
            .main-nav a { margin: 0 8px; font-size: 0.7em; }
        }
    </style>
</head>
<body>

<div id="loader">
    <div class="network-anim">
        <i class="fas fa-server node"></i>
        <div class="packet"></div>
        <i class="fas fa-network-wired node"></i>
    </div>
    <div class="loader-text">SCANNING_SYSTEM...</div>
</div>

<header>
    <h1>LEMAIRE THOMAS</h1>
    <p class="subtitle">Technicien Systèmes & Réseaux</p>
</header>

<nav class="main-nav">
    <a href="index.html">à propos</a>
    <a href="projects.html">projets</a>
    <a href="skills.html" class="active">compétences</a>
    <a href="contact.html">contact</a>
</nav>

<div id="skills-section">
    <h2 id="dynamic-header">
        <i class="fas fa-microchip"></i> 
        <span id="typewriter-text"></span>
    </h2>

    <div class="skills-grid">
        <div class="skill-card">
            <div class="card-header"><i class="fab fa-windows"></i> SYSTÈMES</div>
            <div class="tag-list">
                <span class="tag blue">Windows Server</span>
                <span class="tag blue">Active Directory</span>
                <span class="tag orange">Debian / Ubuntu</span>
            </div>
            <div class="status-footer"><div class="led"></div><span style="font-size:0.7em; color:#888;">STATUS: OPÉRATIONNEL</span></div>
        </div>

        <div class="skill-card">
            <div class="card-header"><i class="fas fa-network-wired"></i> RÉSEAU</div>
            <div class="tag-list">
                <span class="tag blue">VLAN</span>
                <span class="tag blue">Routage</span>
                <span class="tag orange">VPN</span>
            </div>
            <div class="status-footer"><div class="led"></div><span style="font-size:0.7em; color:#888;">STATUS: CONFIGURATION ACTIVE</span></div>
        </div>
        
        </div>
</div>

<footer>© 2026 Lemaire Thomas | Portfolio Technicien Numérique</footer>

<script>
    const hasLoaded = sessionStorage.getItem('firstLoadDone');
    const loader = document.getElementById('loader');
    const textElement = document.getElementById('typewriter-text');
    const step1 = "[SCANNING_SKILLS] : 1024_NODES_DETECTED";
    const step2 = "MES COMPÉTENCES TECHNIQUES";

    function typeEffect(text, i, callback) {
        if (i < text.length) {
            textElement.innerHTML = text.substring(0, i + 1);
            setTimeout(() => typeEffect(text, i + 1, callback), 50); 
        } else if (callback) { callback(); }
    }

    if (hasLoaded) {
        loader.style.display = 'none';
        textElement.innerHTML = step2;
    } else {
        window.addEventListener('load', function() {
            setTimeout(() => {
                loader.classList.add('zoom-out');
                sessionStorage.setItem('firstLoadDone', 'true');
                setTimeout(() => {
                    loader.style.display = 'none';
                    typeEffect(step1, 0, () => {
                        setTimeout(() => {
                            textElement.innerHTML = "";
                            typeEffect(step2, 0);
                        }, 1000);
                    });
                }, 800);
            }, 1500);
        });
    }
</script>
</body>
</html>
