<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compétences | Lemaire Thomas</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f0ff;
            --neon-orange: #ff9d00;
            --bg-dark: #07080c;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }

        /* --- HEADER & NAV (image_203379 & image_20335c) --- */
        header {
            padding: 50px 20px;
            text-align: center;
        }

        .name-glow {
            font-family: 'Orbitron', sans-serif;
            font-size: 3em;
            margin: 0;
            letter-spacing: 5px;
            color: var(--neon-blue);
            text-shadow: 0 0 15px var(--neon-blue); /* Effet image_203379 */
        }

        .subtitle {
            color: var(--neon-blue);
            font-family: 'Orbitron', sans-serif;
            margin-top: 15px;
            font-size: 0.85em;
            letter-spacing: 1px;
        }

        .main-nav {
            display: flex;
            justify-content: center;
            gap: 25px;
            padding: 15px;
            border-bottom: 1px solid #111;
        }

        .main-nav a {
            color: #888;
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75em;
            text-transform: lowercase; /* Minuscules demandées */
            transition: 0.3s;
        }

        .main-nav a.active {
            color: var(--neon-blue);
            text-shadow: 0 0 8px var(--neon-blue);
        }

        /* --- SKILLS GRID --- */
        section {
            max-width: 900px;
            margin: 50px auto;
            padding: 0 20px;
        }

        .category {
            margin-bottom: 45px;
        }

        .category-title {
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-blue);
            font-size: 1.1em;
            margin-bottom: 25px;
            border-left: 3px solid var(--neon-blue);
            padding-left: 15px;
        }

        .skills-list {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        /* --- BADGES (image_1f5d88, image_1f5d7f, etc.) --- */
        .badge {
            padding: 10px 20px;
            border-radius: 6px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9em;
            background: rgba(13, 17, 23, 0.8);
            border: 1px solid transparent;
            transition: 0.3s;
        }

        /* Style Bleu (Windows / Réseau) */
        .badge-blue {
            border-color: var(--neon-blue);
            color: var(--neon-blue);
            text-shadow: 0 0 5px var(--neon-blue);
        }

        /* Style Orange (Debian, Ubuntu, Proxmox, VPN) */
        .badge-orange {
            border-color: var(--neon-orange);
            color: var(--neon-orange);
            text-shadow: 0 0 5px var(--neon-orange);
        }
    </style>
</head>
<body>

<header>
    <h1 class="name-glow">LEMAIRE THOMAS</h1>
    <p class="subtitle">> TECHNICIEN SYSTÈMES & RÉSEAUX</p>
</header>

<nav class="main-nav">
    <a href="index.html">à propos</a>
    <a href="projects.html">projets</a>
    <a href="skills.html" class="active">compétences</a>
    <a href="contact.html">contact</a>
</nav>

<section>
    <div class="category">
        <h2 class="category-title">SYSTEMES</h2>
        <div class="skills-list">
            <span class="badge badge-blue">Windows Server</span>
            <span class="badge badge-blue">Active Directory</span>
            <span class="badge badge-blue">GPO</span>
            <span class="badge badge-blue">DNS</span>
            <span class="badge badge-blue">DHCP</span>
            <span class="badge badge-orange">Debian</span>
            <span class="badge badge-orange">Ubuntu</span>
        </div>
    </div>

    <div class="category">
        <h2 class="category-title">VIRTUALISATION</h2>
        <div class="skills-list">
            <span class="badge badge-orange">Proxmox</span>
            <span class="badge badge-blue">Hyper-V</span>
        </div>
    </div>

    <div class="category">
        <h2 class="category-title">INFRASTRUCTURE</h2>
        <div class="skills-list">
            <span class="badge badge-blue">Assemblage PC / Serveur</span>
            <span class="badge badge-blue">Câble RJ45</span>
            <span class="badge badge-blue">Dépannage</span>
        </div>
    </div>

    <div class="category">
        <h2 class="category-title">RESEAUX</h2>
        <div class="skills-list">
            <span class="badge badge-blue">VLAN</span>
            <span class="badge badge-blue">IPv4 Subnetting</span>
            <span class="badge badge-orange">VPN</span>
        </div>
    </div>
</section>

</body>
</html>
</body>
</html>
