<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Lemaire Thomas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body { 
            background: #0b0c13; 
            color: white; 
            margin: 0; 
            font-family: 'Inter', sans-serif; 
        }

        /* --- LOADER (REMIS À 100%) --- */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0b0c13; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
            transition: transform 1s cubic-bezier(0.7, 0, 0.3, 1), opacity 0.8s ease;
        }
        #loader.zoom-out { transform: scale(12); opacity: 0; pointer-events: none; }
        
        .network-anim { display: flex; align-items: center; gap: 20px; margin-bottom: 25px; }
        .node { color: #00f0ff; font-size: 45px; filter: drop-shadow(0 0 10px #00f0ff); }
        .packet {
            width: 14px; height: 14px; background: #00f0ff; border-radius: 50%;
            box-shadow: 0 0 15px #00f0ff; animation: transfer 0.8s infinite linear;
        }
        @keyframes transfer {
            0% { transform: translateX(-60px); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateX(60px); opacity: 0; }
        }
        .loader-text { color: #00f0ff; font-family: 'Orbitron'; font-weight: bold; letter-spacing: 4px; }

        /* --- HEADER & NAV --- */
        header { text-align: center; padding: 40px 20px; }
        
        /* Utilisation de ton écart exact de 18px du CSS */
        nav {
            text-align: center;
            padding: 15px;
            background: #07080c;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #333;
        }

        nav a {
            color: #888;
            margin: 0 18px; /* TON ÉCART EXACT */
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85em;
            transition: 0.3s;
            white-space: nowrap;
        }

        nav a:hover, nav a.active {
            color: #00f0ff;
            text-shadow: 0 0 10px #00f0ff;
        }

        /* --- STYLE TERMINAL (REMIS À 100%) --- */
        #dynamic-header { min-height: 1.5em; font-family: 'Orbitron'; color: #00f0ff; margin-bottom: 20px; }
        #typewriter-text::after {
            content: "_";
            animation: blink 0.8s infinite;
            margin-left: 5px;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        .terminal-style {
            background: #050505 !important;
            border: 1px solid #333 !important;
            font-family: 'Courier New', monospace;
            padding: 0 !important;
            overflow: hidden;
            margin-bottom: 30px;
        }
        .card-header-term {
            background: #1a1b26; padding: 8px 15px;
            display: flex; align-items: center; gap: 8px;
            border-bottom: 1px solid #333;
        }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .red { background: #ff5f56; } .yellow { background: #ffbd2e; } .green { background: #27c93f; }
        .term-title { color: #888; font-size: 0.8em; margin-left: 10px; font-family: 'Inter'; }
        .term-body { padding: 30px; }

        @media (max-width: 768px) {
            nav a { margin: 0 8px; font-size: 0.65em; }
        }
    </style>
</head>
<body>

<div id="loader">
    <div class="network-anim">
        <i class="fas fa-server node"></i>
        <div class="packet"></div>
        <i class="fas fa-network-wired node"></i>
    </div>
    <div class="loader-text">CONNEXION AU SERVEUR...</div>
</div>

<header>
    <h1>LEMAIRE THOMAS</h1>
    <p style="color: #00f0ff; font-family: 'Orbitron'; margin-top: 10px;">Technicien Systèmes & Réseaux</p>
</header>

<nav>
  <a href="index.html">À propos</a>
  <a href="projects.html">Projets</a>
  <a href="skills.html">Compétences</a>
  <a href="contact.html" class="active">Contact</a>
</nav>

<section style="max-width: 1000px; margin: auto; padding: 20px;">
    <h2 id="dynamic-header">
        <i class="fas fa-terminal"></i> 
        <span id="typewriter-text"></span>
    </h2>

    <div class="terminal-style">
        <div class="card-header-term">
            <span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span>
            <span class="term-title">contact_form.sh</span>
        </div>
        <div class="term-body">
            <form action="#" method="POST">
                <input type="text" placeholder="NOM_UTILISATEUR" required>
                <input type="email" placeholder="EMAIL_DE_RETOUR" required>
                <textarea rows="5" placeholder="CORPS_DU_MESSAGE..." required></textarea>
                <button type="submit" class="btn-open" style="width: 100%; cursor: pointer;">EXECUTE_SEND</button>
            </form>
        </div>
    </div>
</section>

<footer><p style="text-align: center; padding: 40px; color: #444;">© 2026 Lemaire Thomas | Portfolio IT</p></footer>

<script>
    /* SCRIPT DE CHARGEMENT ET TYPEWRITER COMPLET */
    const hasLoaded = sessionStorage.getItem('firstLoadDone');
    const loader = document.getElementById('loader');
    const textElement = document.getElementById('typewriter-text');

    const step1 = "[INITIALISATION] : CONTACT_MODULE_READY";
    const step2 = "ENVOYEZ-MOI UN MESSAGE";

    function typeEffect(text, i, callback) {
        if (i < text.length) {
            textElement.innerHTML = text.substring(0, i + 1);
            setTimeout(() => typeEffect(text, i + 1, callback), 50); 
        } else if (callback) {
            callback();
        }
    }

    if (hasLoaded) {
        loader.style.display = 'none';
        textElement.innerHTML = step2;
    } else {
        window.addEventListener('load', function() {
            setTimeout(() => {
                loader.classList.add('zoom-out');
                sessionStorage.setItem('firstLoadDone', 'true');
                setTimeout(() => {
                    loader.style.display = 'none';
                    typeEffect(step1, 0, () => {
                        setTimeout(() => {
                            textElement.innerHTML = "";
                            typeEffect(step2, 0);
                        }, 1200);
                    });
                }, 800);
            }, 1800);
        });
    }
</script>
</body>
</html>
