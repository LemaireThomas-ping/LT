<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Lemaire Thomas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #0b0c13, #1b1d26);
            color: #e0e5eb;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, #0b0c13, #1b1d26);
            border-bottom: 2px solid #00f0ff33;
            box-shadow: 0 4px 20px rgba(0,255,255,0.1);
        }

        header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.2em;
            color: #00f0ff;
            text-shadow: 0 0 15px #00f0ff66, 0 0 25px #00fff099;
            animation: pulse 3s infinite;
            margin: 0;
            word-wrap: break-word;
        }

        .subtitle {
            color: #00f0ff;
            font-family: 'Orbitron', sans-serif;
            margin-top: 10px;
            font-size: 1.1em;
            text-shadow: 0 0 8px #00f0ff55;
        }

        @keyframes pulse {
            0%, 100% { text-shadow: 0 0 15px #00f0ff66, 0 0 25px #00fff099; }
            50% { text-shadow: 0 0 25px #00f0ff99, 0 0 40px #00fff0aa; }
        }

        .main-nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 15px;
            background: #07080c;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #333;
        }

        .main-nav a {
            color: #888;
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85em;
            transition: 0.3s;
            white-space: nowrap;
            text-transform: lowercase;
        }

        .main-nav a:hover, .main-nav a.active {
            color: #00f0ff;
            text-shadow: 0 0 10px #00f0ff;
        }

        #contact { 
            max-width: 600px; 
            margin: 40px auto; 
            padding: 20px; 
        }

        .contact-header { 
            font-family: 'Orbitron'; 
            color: #00f0ff; 
            margin-bottom: 25px; 
            border-left: 3px solid #00f0ff; 
            padding-left: 15px; 
            font-size: 1.4em;
        }

        .card-contact {
            background: rgba(26, 27, 38, 0.9);
            border: 1px solid rgba(0, 240, 255, 0.1);
            padding: 30px;
            border-radius: 8px;
            transition: 0.3s;
            box-sizing: border-box; /* Sécurité pour le padding */
        }

        .card-contact:hover {
            border-color: #00f0ff;
        }

        .email-info { 
            font-family: 'Courier New', monospace; 
            color: #00f0ff; 
            margin-bottom: 25px; 
            display: block; 
            text-align: center; 
            font-size: 0.9em;
            word-break: break-all; /* Évite que l'email dépasse sur mobile */
        }

        form input, form textarea { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 15px; 
            background: #0b0c13; 
            border: 1px solid #333; 
            color: white; 
            border-radius: 4px; 
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
            transition: 0.3s;
        }

        form input:focus, form textarea:focus { 
            border-color: #00f0ff; 
            outline: none; 
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2); 
        }

        button { 
            background: transparent; 
            color: #00f0ff; 
            border: 1px solid #00f0ff; 
            padding: 15px; 
            font-family: 'Orbitron'; 
            cursor: pointer; 
            transition: 0.3s; 
            width: 100%; 
            letter-spacing: 2px;
            font-weight: bold;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button:hover { 
            background: #00f0ff; 
            color: #0b0c13; 
            box-shadow: 0 0 20px #00f0ff; 
        }

        footer {
            text-align: center;
            padding: 60px;
            color: #444;
            font-size: 0.8em;
        }

        /* --- HARMONISATION MOBILE --- */
        @media (max-width: 600px) {
            header {
                padding: 30px 15px !important;
            }

            header h1 {
                font-size: 1.8em !important;
                letter-spacing: 1px;
            }

            .subtitle {
                font-size: 0.9em !important;
            }

            .main-nav {
                gap: 10px;
                padding: 10px;
            }

            .main-nav a {
                font-size: 0.7em;
            }

            .card-contact {
                padding: 20px;
            }

            .contact-header {
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>LEMAIRE THOMAS</h1>
    <p class="subtitle">Technicien Systèmes & Réseaux</p>
</header>

<nav class="main-nav">
    <a href="index.html">à propos</a>
    <a href="projects.html">projets</a>
    <a href="skills.html">compétences</a>
    <a href="contact.html" class="active">contact</a>
</nav>

<section id="contact">
    <h2 class="contact-header"><i class="fas fa-terminal"></i> TRANSMISSION_MESSAGE</h2>
    
    <div class="card-contact">
        <span class="email-info"><i class="fas fa-envelope"></i> thomas.lemaire77515@gmail.com</span>
        
        <form action="#" method="POST">
            <input type="text" placeholder="NOM_UTILISATEUR" required>
            <input type="email" placeholder="EMAIL_DE_RETOUR" required>
            <textarea rows="5" placeholder="CORPS_DU_MESSAGE..." required></textarea>
            <button type="submit">ENVOYER LA REQUÊTE</button>
        </form>
    </div>
</section>

<footer>© 2026 Lemaire Thomas | Portfolio IT</footer>

</body>
</html>
