<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>À propos | Lemaire Thomas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Style du Loader */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0b0c13; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
            transition: transform 1s cubic-bezier(0.7, 0, 0.3, 1), opacity 0.8s ease;
        }

        /* L'effet tunnel (zoom vers l'avant) */
        #loader.zoom-out {
            transform: scale(10);
            opacity: 0;
            pointer-events: none;
        }

        .network-anim { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; }
        .node { color: #00f0ff; font-size: 40px; }
        
        .packet {
            width: 12px; height: 12px; background: #00f0ff; border-radius: 50%;
            box-shadow: 0 0 15px #00f0ff; animation: transfer 0.8s infinite linear;
        }

        @keyframes transfer {
            0% { transform: translateX(-60px); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateX(60px); opacity: 0; }
        }

        .loader-text {
            color: #00f0ff; font-family: 'Courier New', monospace;
            font-weight: bold; letter-spacing: 3px; animation: glitch 0.3s infinite;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); text-shadow: 2px 0 #ff00c1; }
            40% { transform: translate(-2px, -2px); text-shadow: -2px 0 #7000ff; }
            100% { transform: translate(0); }
        }
    </style>
</head>
<body>

<div id="loader">
    <div class="network-anim">

        <div class="packet"></div>

</body>
</html>
